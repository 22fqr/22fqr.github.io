    <style>
        @keyframes flicker { 0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; } 20%, 24%, 55% { opacity: 0.3; } }
        .animate-flicker { animation: flicker 3s infinite; }
        
        /* ARCADE OVERHAUL CORE */
        .arcade-header { opacity: 1; }

        @keyframes cursor-blink {
            0%, 49% { border-right-color: transparent; }
            50%, 100% { border-right-color: currentColor; }
        }
        .data-entry-input {
            border: 4px solid #000 !important;
            border-radius: 0 !important;
            background: #050505 !important;
            box-shadow: 4px 4px 0px rgba(255,255,255,0.1);
            caret-color: transparent;
        }
        .data-entry-input:focus {
            animation: cursor-blink 0.8s steps(2) infinite;
            border-right: 8px solid currentColor !important;
        }

            position: relative;
            border-radius: 0 !important;
            border-bottom-width: 6px !important;
            border-right-width: 6px !important;
            border-color: rgba(0,0,0,0.5) !important;
            transition: none !important;
        }
        .arcade-btn:active {
            transform: translate(2px, 2px);
            border-bottom-width: 2px !important;
            border-right-width: 2px !important;
        }

        .crt-log {
            background: #020202 !important;
            border: 2px solid #111 !important;
            position: relative;
            overflow: hidden;
        }
        .crt-log::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        @keyframes arcade-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-arcade-spin { animation: arcade-spin 4s steps(8) infinite; }

        /* 8-BIT TOOL ANIMATIONS */
        @keyframes specter-scan {
            0% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            100% { transform: translateX(-10px); }
        }
        .animate-specter { animation: specter-scan 1s steps(4) infinite; }

        @keyframes trace-pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .animate-trace-pulse { animation: trace-pulse 1s steps(3) infinite; }

        @keyframes dns-orbit {
            0% { transform: translate(0, 0); }
            25% { transform: translate(16px, 0); }
            50% { transform: translate(16px, 16px); }
            75% { transform: translate(0, 16px); }
            100% { transform: translate(0, 0); }
        }
        .animate-dns-orbit { animation: dns-orbit 2s steps(8) infinite; }

        @keyframes shield-pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(0.9); opacity: 0.7; }
        }
        .animate-shield-pulse { animation: shield-pulse 1.5s steps(3) infinite; }

        @keyframes satellite-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
        .animate-satellite-float { animation: satellite-float 2s steps(4) infinite; }

        @keyframes telescope-tilt {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(-15deg); }
        }
        .animate-telescope { transform-origin: bottom left; animation: telescope-tilt 3s steps(3) infinite; }

        @keyframes binary-vertical-scroll {
            from { transform: translateY(0); }
            to { transform: translateY(-50%); }
        }
        .animate-binary-scroll {
            animation: binary-vertical-scroll 1.5s steps(6) infinite;
        }

        @keyframes cipher-snap {
            0%, 90% { transform: translateY(0); }
            95% { transform: translateY(-4px); }
        }
        .animate-cipher-snap { animation: cipher-snap 3s steps(1) infinite; }

        @keyframes vault-lock-snap {
            0%, 50% { transform: translateY(0); }
            55%, 95% { transform: translateY(-3px); }
            100% { transform: translateY(0); }
        }
        .animate-vault-lock { animation: vault-lock-snap 2s steps(1) infinite; }

        @keyframes shield-glitch {
            0%, 100% { fill: #ff003c; }
            50% { fill: #fff; }
        }
        .animate-shield-glitch { animation: shield-glitch 0.2s steps(2) infinite; }

        @keyframes web-pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(0.92); opacity: 0.8; }
        }
        .animate-web-pulse { animation: web-pulse 2s steps(4) infinite; }

        @keyframes spider-drop {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(15px); }

        .animate-spider-drop { animation: spider-drop 2s steps(5) infinite; }

        }
        #cyber-canvas { position: fixed; inset: 0; z-index: 0; background: #050505; }

    <script>
    // GHOST OS PRODUCTION UPLINK
    const BACKEND_URL = "https://22fqr-ghost-os-backend.hf.space";

    document.addEventListener("DOMContentLoaded", () => {
        const boot = document.getElementById("boot-screen");
        if(boot) {
            setTimeout(() => {
                boot.style.opacity = '0';
                setTimeout(() => boot.style.display = 'none', 1000);
            }, 1000);
        }
        if(document.getElementById("pass-length")) generatePass();
    });

    async function executeHoleheScan() {
        const email = document.getElementById("target-email").value;
        const log = document.getElementById("results-log");
        const output = document.getElementById("scan-output");
        if(!email) return;
        output.classList.remove("hidden");
        log.innerHTML = "<div class='text-[#00FF41] animate-pulse'>> [SYSTEM] INITIATING_MULTI-VECTOR_OSINT_SCAN...</div>";
        try {
            const res = await fetch(`${BACKEND_URL}/scan`, { 
                method: "POST", 
                headers: {"Content-Type": "application/json"}, 
                body: JSON.stringify({email}) 
            });
            const data = await res.json();
            log.innerHTML = `<div class='text-[#8f00ff] font-bold mt-4'>[FOOTPRINT_INTEL]</div>`;
            if(data.holehe?.length > 0) {
                data.holehe.forEach(h => { log.innerHTML += `<div class='flex justify-between border-b border-white/5 py-1'><span class='text-[#00FF41]'>> ${h}</span><span class='text-[#8f00ff] font-bold'>[VERIFIED]</span></div>`; });
            } else { log.innerHTML += "<div class='text-gray-600 italic'>> NO_DATA_DETECTED</div>"; }
        } catch(e) { log.innerHTML = "<div class='text-[#ff003c]'>[!] UPLINK ERROR</div>"; }
    }

    async function executeSpecterScan() {
        const username = document.getElementById("specter-target").value;
        const log = document.getElementById("specter-results");
        const output = document.getElementById("specter-output");
        if(!username) return;
        output.classList.remove("hidden");
        log.innerHTML = "<div class=\"text-[#ffb000] animate-pulse\">> [SYSTEM] INITIATING_SPECTER_USERNAME_RECON...</div>";
        try {
            const response = await fetch(`${BACKEND_URL}/alias`, { 
                method: "POST", 
                headers: {"Content-Type": "application/json"}, 
                body: JSON.stringify({username}) 
            });
            const data = await response.json();
            log.innerHTML = `<div class='text-gray-500 mb-2'>> SCANNED: ${data.scanned} | FOUND: ${data.found.length}</div>`;
            if(data.found.length > 0){
                data.found.forEach(url => {
                    log.innerHTML += `<div class="py-1"><a href="${url}" target="_blank" class="text-[#00FF41] hover:text-[#ffb000] transition-colors">> ${url}</a></div>`;
                });
            } else { log.innerHTML += "<div class='text-gray-600 italic'>> NO_PROFILES_FOUND</div>"; }
        } catch(e) { log.innerHTML = "<div class=\"text-[#ff003c]\">> [ERROR] UPLINK_FAILED.</div>"; }
    }

    async function executeDnsLookup() {
        const domain = document.getElementById("target-domain").value;
        const log = document.getElementById("dns-log");
        const output = document.getElementById("dns-output");
        if(!domain) return;
        output.classList.remove("hidden");
        log.innerHTML = "<div class='text-[#00f3ff] animate-pulse'>> [SYSTEM] INITIATING_DNS_RECONNAISSANCE...</div>";
        try {
            const response = await fetch(`${BACKEND_URL}/dns`, { 
                method: "POST", 
                headers: {"Content-Type": "application/json"}, 
                body: JSON.stringify({domain}) 
            });
            const data = await response.json();
            log.innerHTML = "";
            if(data.error){ log.innerHTML = `<div class="text-[#ff003c]">> [ERROR] ${data.error}</div>`; return; }
            Object.keys(data).forEach(type => {
                if(data[type].length > 0){
                    data[type].forEach(val => {
                        log.innerHTML += `<div class="flex justify-between border-b border-white/5 py-1"><span class="text-[#00f3ff]">> ${val}</span><span class="text-[#00f3ff] font-bold">[${type}]</span></div>`;
                    });
                } else { log.innerHTML += `<div class="text-gray-600 italic">> NO_${type}_RECORDS_FOUND</div>`; }
            });
        } catch(e) { log.innerHTML = "<div class='text-[#ff003c]'>[!] UPLINK ERROR</div>"; }
    }

    function generateHashes(){
        const t=document.getElementById("hash-input").value;
        const algo=document.getElementById("algo-select").value;
        const out=document.getElementById("out-hash");
        document.getElementById("hash-label").innerText=`[${algo}_OUTPUT]`;
        if(!t){out.innerText="AWAITING_INPUT...";return;}
        if(algo==="Base64") out.innerText=btoa(t);
        else if(algo==="Hex") out.innerText=t.split("").map(c=>c.charCodeAt(0).toString(16).padStart(2,"0")).join("");
        else out.innerText=CryptoJS[algo](t).toString();
    }

    function generatePass(){
        const l=parseInt(document.getElementById("pass-length").value);
        const n=document.getElementById("use-numbers").checked;
        const s=document.getElementById("use-symbols").checked;
        let c="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
        if(n)c+="0123456789";
        if(s)c+="!@#$%^&*()_+~`|}{[]:;?><,./-=";
        let r="";
        const a=new Uint32Array(l);
        window.crypto.getRandomValues(a);
        for(let i=0;i<l;i++){r+=c.charAt(a[i]%c.length);}
        document.getElementById("pass-display").innerText=r;
    }

    function buildDork() {
        const site = document.getElementById("dork-site").value.trim();
        const ext = document.getElementById("dork-ext").value.trim();
        const inurl = document.getElementById("dork-inurl").value.trim();
        const intitle = document.getElementById("dork-intitle").value.trim();
        const exact = document.getElementById("dork-exact").value.trim();
        let dork = "";
        if(site) dork += `site:${site} `;
        if(ext) dork += `filetype:${ext} `;
        if(inurl) dork += `inurl:"${inurl}" `;
        if(intitle) dork += `intitle:"${intitle}" `;
        if(exact) dork += `"${exact}" `;
        const out = document.getElementById("dork-output");
        out.innerText = dork.trim() || "AWAITING_PARAMETERS...";
    }

    function copyDork() {
        const out = document.getElementById("dork-output").innerText;
        if(out && out !== "AWAITING_PARAMETERS...") {
            navigator.clipboard.writeText(out);
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "COPIED";
            setTimeout(() => btn.innerText = originalText, 1500);
        }
    }

    function executeDork() {
        const out = document.getElementById("dork-output").innerText;
        if(out && out !== "AWAITING_PARAMETERS...") {
            window.open(`https://www.google.com/search?q=${encodeURIComponent(out)}`, '_blank');
        }
    }
